<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopEasy</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <h1>ShopEasy</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>
    <main>
        <h2>Checkout</h2>
        <form id="checkout-form" class="checkout-form">
            <label>Name: <input type="text" name="name" required></label>
            <label>Email: <input type="email" name="email" required></label>
            <label>Address: <input type="text" name="address" required></label>
            <label>Pincode: <input type="text" name="pincode" pattern="[0-9]{6}" maxlength="6" required></label>
            <button type="submit" class="btn">Place Order</button>
        </form>
        <div id="order-success" class="hidden">Thank you for your order!</div>
    </main>
    <footer>
        <p>&copy; 2026 ShopEasy. All rights reserved.</p>
    </footer>
    <script src="scripts/checkout.js"></script>
</body>
</html>
